name: Test Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App version, for example 0.1.6"
        required: true
      package_version:
        description: "Artifact label, for example 0.1.6-test-20260416"
        required: false
      build_number:
        description: "Build number override"
        required: false
      configuration:
        description: "Xcode build configuration"
        required: false
        default: Debug
        type: choice
        options:
          - Debug
          - Release

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read

    concurrency:
      group: test-build-${{ github.ref_name }}-${{ github.run_id }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x build.sh scripts/release/package-local-dmg.sh

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          package_version="${{ github.event.inputs.package_version }}"
          build_number="${{ github.event.inputs.build_number }}"
          configuration="${{ github.event.inputs.configuration }}"

          if [[ -z "${version}" ]]; then
            echo "Build version is missing" >&2
            exit 1
          fi

          if [[ -z "${build_number}" ]]; then
            build_number="${GITHUB_RUN_NUMBER}"
          fi

          if [[ -z "${package_version}" ]]; then
            date_suffix="$(date +%Y%m%d)"
            if [[ "${configuration}" == "Debug" ]]; then
              package_version="${version}-debug-${date_suffix}"
            else
              package_version="${version}-test-${date_suffix}"
            fi
          fi

          if [[ -z "${configuration}" ]]; then
            configuration="Debug"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"
          echo "configuration=${configuration}" >> "$GITHUB_OUTPUT"

      - name: Build app and dmg
        env:
          DMUX_VERSION: ${{ steps.meta.outputs.version }}
          DMUX_PACKAGE_VERSION: ${{ steps.meta.outputs.package_version }}
          DMUX_BUILD_NUMBER: ${{ steps.meta.outputs.build_number }}
          DMUX_CONFIGURATION: ${{ steps.meta.outputs.configuration }}
          DMUX_LOG_PROFILE: ${{ steps.meta.outputs.configuration == 'Debug' && 'verbose' || 'compact' }}
          DMUX_APP_VARIANT_SUFFIX: ${{ steps.meta.outputs.configuration == 'Debug' && '-debug' || '' }}
          DMUX_APP_DISPLAY_NAME: ${{ steps.meta.outputs.configuration == 'Debug' && 'Codux-debug' || 'Codux' }}
          DMUX_APP_BUNDLE_NAME: ${{ steps.meta.outputs.configuration == 'Debug' && 'Codux-debug' || 'Codux' }}
          DMUX_BUNDLE_IDENTIFIER_SUFFIX: ${{ steps.meta.outputs.configuration == 'Debug' && '.debug' || '' }}
        run: scripts/release/package-local-dmg.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: codux-${{ steps.meta.outputs.package_version }}-manual
          path: |
            dist/*.dmg
            dist/*.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error
