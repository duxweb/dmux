name: Release Build
run-name: >-
  ${{
    github.event_name == 'push'
    && format('Release {0}', github.ref_name)
    || format('Release v{0}', github.event.inputs.version)
  }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, for example 0.1.6"
        required: true
      publish_release:
        description: "Publish GitHub Release assets after build"
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    concurrency:
      group: release-${{ github.ref_name || github.run_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x dev.sh build.sh scripts/dev/restart-dev-gui.sh scripts/release/package-local-dmg.sh scripts/release/extract-release-notes.sh scripts/release/build-release-notes.sh scripts/release/render-homebrew-cask.sh

      - name: Configure signing and notarization
        env:
          APPLE_BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_BUILD_CERTIFICATE_BASE64 }}
          APPLE_BUILD_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_BUILD_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        shell: bash
        run: |
          if [[ -z "${APPLE_BUILD_CERTIFICATE_BASE64:-}" || -z "${APPLE_BUILD_CERTIFICATE_PASSWORD:-}" || -z "${APPLE_SIGNING_IDENTITY:-}" ]]; then
            echo "[release] signing secrets not configured, continuing with ad-hoc signing"
            exit 0
          fi

          cert_path="$RUNNER_TEMP/build_certificate.p12"
          keychain_path="$RUNNER_TEMP/dmux-build.keychain-db"
          keychain_password="$(uuidgen)"

          echo "$APPLE_BUILD_CERTIFICATE_BASE64" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -P "$APPLE_BUILD_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | tr -d '"')

          echo "APPLE_CODESIGN_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
          echo "DMUX_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"

          if [[ -n "$APPLE_API_KEY_ID" && -n "$APPLE_API_ISSUER_ID" && -n "$APPLE_API_PRIVATE_KEY_BASE64" ]]; then
            api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            echo "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > "$api_key_path"
            echo "APPLE_API_PRIVATE_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
            echo "APPLE_API_ISSUER_ID=$APPLE_API_ISSUER_ID" >> "$GITHUB_ENV"
            echo "DMUX_NOTARIZE=1" >> "$GITHUB_ENV"
          fi

      - name: Resolve build metadata
        id: meta
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [[ -z "${version}" ]]; then
            version="${GITHUB_REF_NAME}"
            version="${version#v}"
          fi
          if [[ -z "${version}" ]]; then
            echo "Release version is missing" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          notes_path="$RUNNER_TEMP/release-notes.md"
          bash scripts/release/build-release-notes.sh "${{ steps.meta.outputs.version }}" "$notes_path" CHANGELOG.md CHANGELOG.zh-CN.md
          echo "path=${notes_path}" >> "$GITHUB_OUTPUT"

      - name: Validate Sparkle signing configuration
        if: github.event_name == 'push' || github.event.inputs.publish_release == 'true'
        shell: bash
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          if [[ -z "${SPARKLE_PUBLIC_ED_KEY:-}" ]]; then
            echo "SPARKLE_PUBLIC_ED_KEY is required for published releases" >&2
            exit 1
          fi
          if [[ -z "${SPARKLE_PRIVATE_ED_KEY:-}" ]]; then
            echo "SPARKLE_PRIVATE_ED_KEY is required for published releases" >&2
            exit 1
          fi

      - name: Build app and dmg
        shell: bash
        env:
          DMUX_VERSION: ${{ steps.meta.outputs.version }}
          DMUX_BUILD_NUMBER: ${{ steps.meta.outputs.build_number }}
          DMUX_LOG_PROFILE: compact
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          APPLE_CODESIGN_IDENTITY: ${{ env.APPLE_CODESIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          APPLE_API_PRIVATE_KEY_PATH: ${{ env.APPLE_API_PRIVATE_KEY_PATH }}
          APPLE_API_KEY_ID: ${{ env.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ env.APPLE_API_ISSUER_ID }}
          DMUX_NOTARIZE: ${{ env.DMUX_NOTARIZE }}
        run: |
          release_assets_dir="$RUNNER_TEMP/release-assets"
          rm -rf "$release_assets_dir"
          mkdir -p "$release_assets_dir"

          scripts/release/package-local-dmg.sh
          cp dist/*.dmg "$release_assets_dir/"
          cp dist/*.zip "$release_assets_dir/"

          (
            cd "$release_assets_dir"
            shasum -a 256 *.dmg *.zip > SHA256SUMS.txt
          )

          rm -rf dist
          mkdir -p dist
          cp "$release_assets_dir"/* dist/

      - name: Generate Sparkle appcast
        shell: bash
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          if [[ -z "${SPARKLE_PRIVATE_ED_KEY:-}" ]]; then
            echo "SPARKLE_PRIVATE_ED_KEY is required to publish a signed Sparkle appcast" >&2
            exit 1
          fi

          sparkle_bin_dir="$(find "${PWD}/.xcode-release/SourcePackages" -path '*sparkle/Sparkle/bin' | head -n 1)"
          if [[ -z "${sparkle_bin_dir}" ]]; then
            echo "Unable to locate Sparkle tools in SourcePackages" >&2
            exit 1
          fi

          appcast_dir="$RUNNER_TEMP/sparkle-appcast"
          rm -rf "$appcast_dir"
          mkdir -p "$appcast_dir"

          release_dmg="Codux-${{ steps.meta.outputs.version }}-macos-universal.dmg"
          cp "dist/${release_dmg}" "$appcast_dir/"
          cp "${{ steps.notes.outputs.path }}" "$appcast_dir/Codux-${{ steps.meta.outputs.version }}-macos-universal.md"

          printf '%s' "$SPARKLE_PRIVATE_ED_KEY" | "${sparkle_bin_dir}/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/duxweb/codux/releases/download/v${{ steps.meta.outputs.version }}/" \
            --full-release-notes-url "https://github.com/duxweb/codux/releases/tag/v${{ steps.meta.outputs.version }}" \
            --embed-release-notes \
            --link "https://github.com/duxweb/codux" \
            -o "$appcast_dir/appcast.xml" \
            "$appcast_dir"

          cp "$appcast_dir/appcast.xml" dist/appcast.xml

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: codux-${{ steps.meta.outputs.version }}-macos-universal
          path: |
            dist/Codux-${{ steps.meta.outputs.version }}-macos-universal.dmg
            dist/Codux-${{ steps.meta.outputs.version }}-macos-universal.zip
            dist/appcast.xml
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'push' || github.event.inputs.publish_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.version }}
          name: Codux v${{ steps.meta.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            dist/Codux-${{ steps.meta.outputs.version }}-macos-universal.dmg
            dist/Codux-${{ steps.meta.outputs.version }}-macos-universal.zip
            dist/appcast.xml
            dist/SHA256SUMS.txt

      - name: Publish Homebrew tap
        if: github.event_name == 'push' || github.event.inputs.publish_release == 'true'
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "[tap] HOMEBREW_TAP_TOKEN is not configured, skipping tap publish"
            {
              echo "### Homebrew tap"
              echo
              echo "- Skipped: \`HOMEBREW_TAP_TOKEN\` is not configured."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          set +e

          tap_dir="$RUNNER_TEMP/homebrew-tap"
          tap_repo_url="https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/duxweb/homebrew-tap.git"
          rm -rf "$tap_dir"
          git clone "$tap_repo_url" "$tap_dir"
          clone_status=$?
          if [[ $clone_status -ne 0 ]]; then
            echo "::warning::[tap] Failed to clone duxweb/homebrew-tap using HOMEBREW_TAP_TOKEN. Check token validity and repo write access."
            {
              echo "### Homebrew tap"
              echo
              echo "- Failed: could not clone \`duxweb/homebrew-tap\`."
              echo "- Check whether \`HOMEBREW_TAP_TOKEN\` is valid and has read/write access to the tap repository."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          dmg_path="dist/Codux-${VERSION}-macos-universal.dmg"
          sha256="$(shasum -a 256 "$dmg_path" | awk '{print $1}')"

          bash scripts/release/render-homebrew-cask.sh "$VERSION" "$sha256" "$tap_dir/Casks/codux.rb"

          cd "$tap_dir"
          if git diff --quiet -- Casks/codux.rb; then
            echo "[tap] cask already up to date"
            {
              echo "### Homebrew tap"
              echo
              echo "- Skipped: cask is already up to date."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/codux.rb
          git commit -m "Update codux cask to v${VERSION}"
          commit_status=$?
          if [[ $commit_status -ne 0 ]]; then
            echo "::warning::[tap] Failed to commit Homebrew cask update."
            {
              echo "### Homebrew tap"
              echo
              echo "- Failed: could not commit the generated cask update."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git push origin HEAD:main
          push_status=$?
          if [[ $push_status -ne 0 ]]; then
            echo "::warning::[tap] Failed to push Homebrew tap update using HOMEBREW_TAP_TOKEN. Check token validity and tap repository permissions."
            {
              echo "### Homebrew tap"
              echo
              echo "- Failed: could not push the cask update to \`duxweb/homebrew-tap\`."
              echo "- Check whether \`HOMEBREW_TAP_TOKEN\` is valid and has read/write access to the tap repository."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "### Homebrew tap"
            echo
            echo "- Published: \`duxweb/homebrew-tap\` updated to \`${VERSION}\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup signing assets
        if: always()
        shell: bash
        run: |
          if [[ -n "${DMUX_KEYCHAIN_PATH:-}" && -f "${DMUX_KEYCHAIN_PATH}" ]]; then
            security delete-keychain "${DMUX_KEYCHAIN_PATH}" || true
          fi
          if [[ -n "${APPLE_API_PRIVATE_KEY_PATH:-}" && -f "${APPLE_API_PRIVATE_KEY_PATH}" ]]; then
            rm -f "${APPLE_API_PRIVATE_KEY_PATH}"
          fi
